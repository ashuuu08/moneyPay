name: CI — Build, Test & Analyze

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx2g'

jobs:

  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moneypay_auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules (skip tests)
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Run unit & slice tests
        run: mvn test --no-transfer-progress
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: changeme
          REDIS_HOST: localhost
          JWT_SECRET: ci_test_secret_must_be_at_least_32_chars

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

  docker-build:
    name: Docker Image Build Check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Package services
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image — auth-service (validation only)
        uses: docker/build-push-action@v5
        with:
          context: auth-service
          push: false
          tags: moneypay/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
