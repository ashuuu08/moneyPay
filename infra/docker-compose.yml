version: "3.9"

# ─── Shared Network ─────────────────────────────────────────────────────────
networks:
  moneypay-net:
    driver: bridge

# ─── Shared Volume Declarations ─────────────────────────────────────────────
volumes:
  postgres_auth_data:
  postgres_payment_data:
  postgres_wallet_data:
  postgres_ledger_data:
  postgres_merchant_data:
  zookeeper_data:
  kafka_data:
  redis_data:

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: moneypay-zookeeper
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ───────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: moneypay-kafka
    restart: unless-stopped
    networks: [moneypay-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka UI (Kafdrop) ─────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: moneypay-kafdrop
    restart: unless-stopped
    networks: [moneypay-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: moneypay-redis
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — Auth ──────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: moneypay-postgres-auth
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      POSTGRES_DB: moneypay_auth
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d moneypay_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — Payment ───────────────────────────────────────────────
  postgres-payment:
    image: postgres:16-alpine
    container_name: moneypay-postgres-payment
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      POSTGRES_DB: moneypay_payment
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d moneypay_payment"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — Wallet ────────────────────────────────────────────────
  postgres-wallet:
    image: postgres:16-alpine
    container_name: moneypay-postgres-wallet
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      POSTGRES_DB: moneypay_wallet
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data

  # ── PostgreSQL — Ledger ────────────────────────────────────────────────
  postgres-ledger:
    image: postgres:16-alpine
    container_name: moneypay-postgres-ledger
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      POSTGRES_DB: moneypay_ledger
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_ledger_data:/var/lib/postgresql/data

  # ── PostgreSQL — Merchant ──────────────────────────────────────────────
  postgres-merchant:
    image: postgres:16-alpine
    container_name: moneypay-postgres-merchant
    restart: unless-stopped
    networks: [moneypay-net]
    environment:
      POSTGRES_DB: moneypay_merchant
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_merchant_data:/var/lib/postgresql/data

  # ── Eureka Server ─────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ../eureka-server
      dockerfile: Dockerfile
    image: moneypay/eureka-server:latest
    container_name: moneypay-eureka
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8761:8761"
    environment:
      EUREKA_USER: ${EUREKA_USER:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin}
    profiles: [full]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Auth Service ──────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    image: moneypay/auth-service:latest
    container_name: moneypay-auth
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: moneypay_auth
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      EUREKA_URI: http://${EUREKA_USER:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_must_be_at_least_32_chars}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
    profiles: [full]

  # ── API Gateway ───────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: moneypay/api-gateway:latest
    container_name: moneypay-gateway
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      EUREKA_URI: http://${EUREKA_USER:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_must_be_at_least_32_chars}
    profiles: [full]

  # ── Payment Service ───────────────────────────────────────────────────
  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    image: moneypay/payment-service:latest
    container_name: moneypay-payment
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8082:8082"
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: moneypay_payment
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_URI: http://${EUREKA_USER:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_must_be_at_least_32_chars}
    profiles: [full]

  # ── Wallet Service ────────────────────────────────────────────────────
  wallet-service:
    build:
      context: ../wallet-service
      dockerfile: Dockerfile
    image: moneypay/wallet-service:latest
    container_name: moneypay-wallet
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8083:8083"
    depends_on:
      postgres-wallet:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres-wallet
      DB_PORT: 5432
      DB_NAME: moneypay_wallet
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URI: http://${EUREKA_USER:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka
    profiles: [full]

  # ── Ledger Service ────────────────────────────────────────────────────
  ledger-service:
    build:
      context: ../ledger-service
      dockerfile: Dockerfile
    image: moneypay/ledger-service:latest
    container_name: moneypay-ledger
    restart: unless-stopped
    networks: [moneypay-net]
    ports:
      - "8084:8084"
    depends_on:
      postgres-ledger:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres-ledger
      DB_PORT: 5432
      DB_NAME: moneypay_ledger
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URI: http://${EUREKA_USER:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka
    profiles: [full]
